<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <title>my-portfolio</title>
</head>

<body>
  <div id="app"></div>
  <div class="notification-container">
    <div class="notification">
      <img class="profile-pic" src="./src/assets/profile-pic.jpg" alt="">
      <div class="notification-content">
        <p class="notification-sender">Velin</p>
        <p class="notification-title">new message</p>
      </div>
      <div class="notification-buttons">
        <a class="delete" href="">
          <span class="material-symbols-outlined">
            delete
          </span>
        </a>
        <a class="view" href="">
          <span class="material-symbols-outlined icon-drafts">
            drafts
          </span>
          <span class="material-symbols-outlined icon-waving">
            waving_hand
          </span>
        </a>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
